<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>إدارة الوثائق</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">📄 إدارة الوثائق</span>

    <a href="dashboard.html" class="btn btn-secondary btn-sm">
        رجوع
    </a>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
        <h3 class="fw-bold">الوثائق</h3>

        <a href="add_document.html" class="btn btn-primary">
            + إضافة وثيقة
        </a>
    </div>

    <!-- الفلاتر -->
    <div class="card shadow-sm p-3 mb-4">
        <div class="row">

            <div class="col-md-4">
                <label class="fw-bold">التصنيف</label>
                <select id="filterCategory" class="form-control">
                    <option value="">الكل</option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="fw-bold">الحالة</label>
                <select id="filterStatus" class="form-control">
                    <option value="">الكل</option>
                    <option value="ACTIVE">نشطة</option>
                    <option value="ARCHIVED">مؤرشفة</option>
                </select>
            </div>

            <div class="col-md-4">
                <button class="btn btn-dark w-100 mt-4" onclick="loadDocuments()">
                    بحث
                </button>
            </div>

        </div>
    </div>

    <!-- جدول الوثائق -->
    <div class="card shadow">
        <div class="card-body">

            <table class="table table-striped text-center">
                <thead>
                    <tr>
                        <th>الرقم المرجعي</th>
                        <th>العنوان</th>
                        <th>التصنيف</th>
                        <th>الحالة</th>
                        <th>المالك</th>
                        <th>العمليات</th>
                    </tr>
                </thead>

                <tbody id="documentsTable"></tbody>
            </table>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/documents.js"></script>

</body>
</html>
