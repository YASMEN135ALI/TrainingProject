<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>إدارة المستخدمين</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">👥 إدارة المستخدمين</span>

    <button class="btn btn-danger btn-sm" onclick="logout()">
        تسجيل خروج
    </button>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
        <h3>المستخدمون</h3>

        <button class="btn btn-primary" onclick="openAddUser()">
            + إضافة مستخدم
        </button>
    </div>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-striped text-center">
                <thead>
                    <tr>
                        <th>اسم المستخدم</th>
                        <th>البريد</th>
                        <th>الدور</th>
                        <th>الحالة</th>
                        <th>العمليات</th>
                    </tr>
                </thead>

                <tbody id="usersTable"></tbody>
            </table>

        </div>
    </div>

</div>

<!-- Add User Modal -->
<div class="modal fade" id="addUserModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5>إضافة مستخدم</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <input id="addUsername" class="form-control mb-2" placeholder="اسم المستخدم">
                <input id="addEmail" class="form-control mb-2" placeholder="البريد">
                <input id="addPassword" type="password" class="form-control mb-2" placeholder="كلمة المرور">

                <select id="addRole" class="form-control">
                    <option value="employee">موظف</option>
                    <option value="manager">مسؤول قسم</option>
                    <option value="admin">مدير</option>
                </select>
            </div>

            <div class="modal-footer">
                <button class="btn btn-success" onclick="addUser()">حفظ</button>
            </div>

        </div>
    </div>
</div>

<!-- Edit User Modal -->
<div class="modal fade" id="editUserModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5>تعديل مستخدم</h5>
            </div>

            <div class="modal-body">
                <input type="hidden" id="editId">

                <input id="editEmail" class="form-control mb-3" placeholder="البريد">

                <select id="editRole" class="form-control">
                    <option value="employee">موظف</option>
                    <option value="manager">مسؤول قسم</option>
                    <option value="admin">مدير</option>
                </select>
            </div>

            <div class="modal-footer">
                <button class="btn btn-success" onclick="updateUser()">حفظ التعديل</button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/users.js"></script>

</body>
</html>
