<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الإعدادات العامة</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

    <!-- شريط علوي -->
    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand mb-0 h1">الإعدادات العامة</span>
        <a href="../dashboard.html" class="btn btn-secondary btn-sm">رجوع</a>
    </nav>

    <div class="container mt-4">

        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">إعدادات النظام</h4>
            </div>

            <div class="card-body">

                <!-- أنواع الوثائق -->
                <div class="mb-4">
                    <label class="form-label fw-bold">أنواع الوثائق (JSON)</label>
                    <textarea id="docTypes" class="form-control" rows="6"
                        placeholder='{"1":"تقارير","2":"عقود"}'></textarea>
                    <small class="text-muted">أدخل البيانات بصيغة JSON.</small>
                </div>

                <!-- مستويات السرية -->
                <div class="mb-4">
                    <label class="form-label fw-bold">مستويات السرية (JSON)</label>
                    <textarea id="securityLevels" class="form-control" rows="6"
                        placeholder='{"1":"عام","2":"سري"}'></textarea>
                    <small class="text-muted">أدخل البيانات بصيغة JSON.</small>
                </div>

                <!-- قواعد الأرشفة -->
                <div class="mb-4">
                    <label class="form-label fw-bold">قواعد الأرشفة (JSON)</label>
                    <textarea id="archiveRules" class="form-control" rows="8"
                        placeholder='{"archive_after":"180","delete_allowed":false}'></textarea>
                    <small class="text-muted">أدخل البيانات بصيغة JSON.</small>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-success" onclick="saveSettings()">حفظ الإعدادات</button>
                    <button class="btn btn-secondary" onclick="loadSettings()">إعادة تحميل</button>
                </div>

            </div>
        </div>

    </div>

    <script src="../js/settings.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
