<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الإعدادات</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

    <!-- شريط علوي -->
    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand mb-0 h1">الإعدادات العامة</span>
        <a href="../dashboard.html" class="btn btn-secondary btn-sm">رجوع</a>
    </nav>

    <div class="container mt-4">

        <h3 class="fw-bold mb-4">الإعدادات العامة للنظام</h3>

        <div class="card shadow-sm p-4">

            <h5 class="fw-bold mb-3">أنواع الوثائق</h5>
            <input id="docTypes" class="form-control mb-4" placeholder="مثال: تقارير، عقود، مراسلات">

            <h5 class="fw-bold mb-3">مستويات السرية</h5>
            <input id="securityLevels" class="form-control mb-4" placeholder="مثال: عام، داخلي، سري، سري للغاية">

            <h5 class="fw-bold mb-3">قواعد الأرشفة</h5>
            <textarea id="archiveRules" class="form-control mb-4" rows="4" placeholder="مثال: يتم أرشفة الوثائق بعد 6 أشهر من إنشائها"></textarea>

            <button class="btn btn-success w-100" onclick="saveSettings()">حفظ الإعدادات</button>

        </div>

    </div>

    <script src="../js/settings.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
