<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>البحث عن الوثائق</title>

    <link rel="stylesheet" href="../css/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .content {
            margin-right: 260px;
            padding: 20px;
        }
        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar bg-dark text-white p-3">
        <h4 class="mb-4">لوحة المدير</h4>

        <ul class="nav flex-column">
            <li class="nav-item mb-2"><a href="dashboard-admin.html" class="nav-link text-white">📊 Dashboard</a></li>
            <li class="nav-item mb-2"><a href="users.html" class="nav-link text-white">👥 Users</a></li>
            <li class="nav-item mb-2"><a href="permissions.html" class="nav-link text-white">🔐 Permissions</a></li>
            <li class="nav-item mb-2"><a href="categories.html" class="nav-link text-white">📂 Categories</a></li>
            <li class="nav-item mb-2"><a href="documents.html" class="nav-link text-white">📄 Documents</a></li>
            <li class="nav-item mb-2"><a href="search.html" class="nav-link text-white">🔎 Search</a></li>
            <li class="nav-item mb-2"><a href="activity_logs.html" class="nav-link text-white">📜 Activity Log</a></li>
            <li class="nav-item mb-2"><a href="settings.html" class="nav-link text-white">⚙️ Settings</a></li>
            <li class="nav-item mt-4"><a href="login.html" class="nav-link text-danger fw-bold">🚪 Logout</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="content">

        <!-- Navbar -->
        <nav class="navbar navbar-dark bg-dark px-3 mb-4 rounded">
            <span class="navbar-brand">🔎 البحث عن الوثائق</span>
        </nav>

        <h3 class="fw-bold mb-4">البحث عن الوثائق</h3>

        <!-- الفلاتر -->
        <div class="card shadow-sm mb-4">
            <div class="card-header fw-bold">خيارات البحث</div>

            <div class="card-body">

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label class="form-label">الرقم المرجعي</label>
                        <input id="searchRef" class="form-control" placeholder="رقم الوثيقة">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">العنوان</label>
                        <input id="searchTitle" class="form-control" placeholder="عنوان الوثيقة">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">التصنيف</label>
                        <select id="searchCategory" class="form-control">
                            <option value="">اختر التصنيف</option>
                        </select>
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label class="form-label">الحالة</label>
                        <select id="searchStatus" class="form-control">
                            <option value="">اختر الحالة</option>
                            <option value="ACTIVE">نشط</option>
                            <option value="ARCHIVED">مؤرشف</option>
                            <option value="DELETED">محذوف</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">المالك</label>
                        <select id="searchUser" class="form-control">
                            <option value="">اختر المستخدم</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">تاريخ الإنشاء</label>
                        <input id="searchDate" type="date" class="form-control">
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <button class="btn btn-primary w-100" onclick="searchDocuments()">بحث</button>
                    </div>

                    <div class="col-md-6 mb-3">
                        <button class="btn btn-secondary w-100" onclick="resetFilters()">إعادة تعيين</button>
                    </div>

                </div>

            </div>
        </div>

        <!-- النتائج -->
        <div class="card shadow-sm">

            <div class="card-header d-flex justify-content-between align-items-center">
                <span class="fw-bold">نتائج البحث</span>
                <button class="btn btn-success btn-sm" onclick="searchDocuments()">تحديث</button>
            </div>

            <div class="card-body">

                <table class="table table-bordered table-hover text-center align-middle">

                    <thead class="table-dark">
                        <tr>
                            <th>الرقم المرجعي</th>
                            <th>العنوان</th>
                            <th>التصنيف</th>
                            <th>الحالة</th>
                            <th>المالك</th>
                            <th width="180">العمليات</th>
                        </tr>
                    </thead>

                    <tbody id="resultsTable">
                        <tr>
                            <td colspan="6" class="text-muted">لا توجد نتائج</td>
                        </tr>
                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script src="../js/search.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
