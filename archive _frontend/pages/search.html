<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>البحث المتقدم</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

<!-- الشريط العلوي -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand mb-0 h1">🔎 البحث المتقدم</span>

    <a href="dashboard.html"
       id="backButton"
       class="btn btn-secondary btn-sm">
        رجوع
    </a>
</nav>

<!-- محتوى الصفحة -->
<div class="container mt-4">

    <h3 class="fw-bold mb-4">البحث المتقدم عن الوثائق</h3>

    <!-- فلاتر البحث -->
    <div class="card p-4 shadow-sm mb-4">
        <div class="row">

            <!-- الرقم المرجعي -->
            <div class="col-md-4 mb-3">
                <label class="fw-bold">رقم الوثيقة</label>
                <input id="searchRef"
                       class="form-control"
                       placeholder="مثال: DOC-2024-001">
            </div>

            <!-- العنوان -->
            <div class="col-md-4 mb-3">
                <label class="fw-bold">عنوان الوثيقة</label>
                <input id="searchTitle"
                       class="form-control"
                       placeholder="اكتب جزء من العنوان">
            </div>

            <!-- التصنيف -->
            <div class="col-md-4 mb-3">
                <label class="fw-bold">التصنيف</label>
                <select id="searchCategory" class="form-control">
                    <option value="">الكل</option>
                </select>
            </div>

            <!-- الحالة -->
            <div class="col-md-4 mb-3">
                <label class="fw-bold">الحالة</label>
                <select id="searchStatus" class="form-control">
                    <option value="">الكل</option>
                    <option value="ACTIVE">نشط</option>
                    <option value="ARCHIVED">مؤرشف</option>
                    <option value="DELETED">محذوف</option>
                </select>
            </div>

            <!-- المستخدم -->
            <div class="col-md-4 mb-3">
                <label class="fw-bold">المستخدم</label>
                <select id="searchUser" class="form-control">
                    <option value="">الكل</option>
                </select>
            </div>

            <!-- التاريخ -->
            <div class="col-md-4 mb-3">
                <label class="fw-bold">التاريخ</label>
                <input id="searchDate"
                       type="date"
                       class="form-control">
            </div>

            <!-- الأزرار -->
            <div class="col-md-6 mt-3">
                <button class="btn btn-dark w-100"
                        onclick="searchDocuments()">
                    🔎 بحث
                </button>
            </div>

            <div class="col-md-6 mt-3">
                <button class="btn btn-secondary w-100"
                        onclick="resetFilters()">
                    🔄 إعادة تعيين
                </button>
            </div>

        </div>
    </div>

    <!-- نتائج البحث -->
    <div class="card shadow-sm">
        <div class="card-body">

            <h5 class="fw-bold mb-3">نتائج البحث</h5>

            <div class="table-responsive">
                <table class="table table-striped text-center">
                    <thead>
                        <tr>
                            <th>الرقم المرجعي</th>
                            <th>العنوان</th>
                            <th>التصنيف</th>
                            <th>الحالة</th>
                            <th>المالك</th>
                            <th>العمليات</th>
                        </tr>
                    </thead>

                    <tbody id="resultsTable">
                        <tr>
                            <td colspan="6" class="text-muted">
                                استخدم الفلاتر للبحث عن الوثائق
                            </td>
                        </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

<script src="../js/search.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
