<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>ملفات الوثيقة</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        .content {
            margin-right: 260px;
            padding: 20px;
        }
        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar bg-dark text-white p-3">
        <h4 class="mb-4">لوحة المدير</h4>

        <ul class="nav flex-column">
            <li class="nav-item mb-2"><a href="dashboard-admin.html" class="nav-link text-white">📊 Dashboard</a></li>
            <li class="nav-item mb-2"><a href="users.html" class="nav-link text-white">👥 Users</a></li>
            <li class="nav-item mb-2"><a href="permissions.html" class="nav-link text-white">🔐 Permissions</a></li>
            <li class="nav-item mb-2"><a href="categories.html" class="nav-link text-white">📂 Categories</a></li>
            <li class="nav-item mb-2"><a href="documents.html" class="nav-link text-white">📄 Documents</a></li>
            <li class="nav-item mb-2"><a href="search.html" class="nav-link text-white">🔎 Search</a></li>
            <li class="nav-item mb-2"><a href="activity_logs.html" class="nav-link text-white">📜 Activity Log</a></li>
            <li class="nav-item mb-2"><a href="settings.html" class="nav-link text-white">⚙️ Settings</a></li>
            <li class="nav-item mt-4"><a href="login.html" class="nav-link text-danger fw-bold">🚪 Logout</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="content">

        <!-- شريط علوي -->
        <nav class="navbar navbar-dark bg-dark px-3 mb-4 rounded">
            <span class="navbar-brand">📁 ملفات الوثيقة</span>

            <a href="#" id="backBtn" class="btn btn-secondary btn-sm">
                رجوع
            </a>
        </nav>

        <h3 class="fw-bold mb-2">ملفات الوثيقة</h3>
        <h5 id="documentTitle" class="text-muted mb-4"></h5>

        <!-- رفع ملف -->
        <div class="card shadow-sm mb-4">
            <div class="card-header fw-bold">رفع ملف جديد</div>

            <div class="card-body">
                <input type="file" id="newFile" class="form-control mb-3">

                <div class="d-grid">
                    <button class="btn btn-success" onclick="uploadFile()">
                        رفع الملف
                    </button>
                </div>
            </div>
        </div>

        <!-- جدول الملفات -->
        <div class="card shadow-sm">
            <div class="card-header fw-bold">الملفات المرفقة</div>

            <div class="card-body">
                <table class="table table-striped table-hover text-center align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>اسم الملف</th>
                            <th>تاريخ الرفع</th>
                            <th>الرافع</th>
                            <th>تحميل</th>
                            <th>حذف</th>
                        </tr>
                    </thead>

                    <tbody id="filesTable">
                        <tr>
                            <td colspan="6" class="text-muted">
                                لا توجد ملفات مرفقة
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/document_files.js"></script>
</body>

</html>
