<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>سجل النشاطات</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

<!-- الشريط العلوي -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand mb-0 h1">📜 سجل النشاطات</span>
    <a href="../dashboard.html" id="backButton" class="btn btn-secondary btn-sm">رجوع</a>
</nav>

<!-- محتوى الصفحة -->
<div class="container mt-4">
    <h3 class="fw-bold mb-4">سجل النشاطات</h3>

    <!-- الفلاتر -->
    <div class="card p-3 shadow-sm mb-4">
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="fw-bold">المستخدم</label>
                <input id="filterUser" class="form-control" placeholder="اسم المستخدم">
            </div>

            <div class="col-md-4 mb-3">
                <label class="fw-bold">العملية</label>
                <input id="filterAction" class="form-control" placeholder="نوع العملية">
            </div>

            <div class="col-md-4 mb-3">
                <label class="fw-bold">الوثيقة</label>
                <input id="filterDocument" class="form-control" placeholder="رقم الوثيقة">
            </div>

            <div class="col-md-12">
                <button class="btn btn-dark w-100" onclick="loadActivity()">تطبيق الفلاتر</button>
            </div>
        </div>
    </div>

    <!-- جدول النشاطات -->
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-striped text-center">
                <thead>
                    <tr>
                        <th>المستخدم</th>
                        <th>العملية</th>
                        <th>الوثيقة</th>
                        <th>التاريخ</th>
                    </tr>
                </thead>
                <tbody id="activityTable">
                    <tr>
                        <td colspan="4" class="text-muted">جاري تحميل النشاطات...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="../js/activity_logs.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
