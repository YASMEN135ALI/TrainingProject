<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="login-body">

    <div class="login-container">
        <h2 class="text-center mb-4">تسجيل الدخول</h2>

        <div class="card p-4 shadow-sm">

            <form id="loginForm">

                <label class="form-label fw-bold">اسم المستخدم</label>
                <input id="username" class="form-control" placeholder="أدخل اسم المستخدم">

                <label class="form-label fw-bold mt-3">كلمة المرور</label>
                <input id="password" type="password" class="form-control" placeholder="أدخل كلمة المرور">

                <button class="btn btn-primary w-100 mt-4" type="submit">
                    تسجيل الدخول
                </button>

            </form>

            <p id="loginMessage" class="text-center mt-3 text-danger"></p>

        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>

</html>
