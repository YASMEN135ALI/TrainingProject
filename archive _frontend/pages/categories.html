<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تصنيفات الوثائق</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

    <!-- شريط علوي -->
    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand mb-0 h1">تصنيفات الوثائق</span>
        <a href="../pages/dashboard.html" class="btn btn-secondary btn-sm">رجوع</a>
    </nav>

    <div class="container mt-4">

        <div class="d-flex justify-content-between mb-3">
            <h3 class="fw-bold">التصنيفات</h3>
            <button class="btn btn-primary" onclick="openAddCategory()">إضافة تصنيف</button>
        </div>

        <!-- جدول التصنيفات -->
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-striped text-center">
                    <thead>
                        <tr>
                            <th>رقم</th>
                            <th>اسم التصنيف</th>
                            <th>العمليات</th>
                        </tr>
                    </thead>
                    <tbody id="categoriesTable">
                        <!-- تعبئة من JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- نافذة إضافة تصنيف -->
    <div class="modal fade" id="addCategoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">إضافة تصنيف جديد</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <label class="fw-bold">اسم التصنيف</label>
                    <input id="addCategoryName" class="form-control">

                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" onclick="addCategory()">حفظ</button>
                </div>

            </div>
        </div>
    </div>

    <!-- نافذة تعديل تصنيف -->
    <div class="modal fade" id="editCategoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">تعديل التصنيف</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="editCategoryId">

                    <label class="fw-bold">اسم التصنيف</label>
                    <input id="editCategoryName" class="form-control">

                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" onclick="updateCategory()">حفظ التعديلات</button>
                </div>

            </div>
        </div>
    </div>

    <script src="../js/categories.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
