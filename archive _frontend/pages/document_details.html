<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تفاصيل الوثيقة</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

    <!-- شريط علوي -->
    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand mb-0 h1">تفاصيل الوثيقة</span>
        <a href="documents.html" class="btn btn-secondary btn-sm">رجوع</a>
    </nav>

    <div class="container mt-4">

        <h3 class="fw-bold mb-4">تفاصيل الوثيقة</h3>

        <div class="card shadow-sm p-4">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="fw-bold">الرقم المرجعي</label>
                    <p id="refNumber" class="form-control bg-light"></p>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="fw-bold">عنوان الوثيقة</label>
                    <p id="title" class="form-control bg-light"></p>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="fw-bold">التصنيف</label>
                    <p id="category" class="form-control bg-light"></p>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="fw-bold">مستوى السرية</label>
                    <p id="securityLevel" class="form-control bg-light"></p>
                </div>

                <div class="col-md-12 mb-3">
                    <label class="fw-bold">الوصف</label>
                    <p id="description" class="form-control bg-light"></p>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="fw-bold">المالك</label>
                    <p id="owner" class="form-control bg-light"></p>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="fw-bold">تاريخ الإنشاء</label>
                    <p id="createdAt" class="form-control bg-light"></p>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="fw-bold">تاريخ الأرشفة</label>
                    <p id="archiveDate" class="form-control bg-light"></p>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="fw-bold">الحالة</label>
                    <p id="status" class="form-control bg-light"></p>
                </div>

                <div class="col-md-12 mb-3">
                    <label class="fw-bold">الملف المرفق</label>
                    <a id="attachmentLink" href="#" target="_blank" class="btn btn-info btn-sm">تحميل الملف</a>
                </div>

            </div>

            <hr>

            <div class="d-flex gap-3">
                <a id="filesLink" class="btn btn-primary">ملفات الوثيقة</a>
                <a id="statusLink" class="btn btn-secondary">سجل الحالات</a>
            </div>

        </div>

    </div>

   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
 <script src="../js/document_details.js"></script>
</body>
</html>
