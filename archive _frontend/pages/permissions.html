<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الصلاحيات</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

<!-- شريط علوي -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">إدارة الصلاحيات</span>
    <a href="dashboard.html" class="btn btn-secondary btn-sm">رجوع</a>
</nav>

<div class="container mt-4">

    <!-- عنوان + زر إضافة -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold">صلاحيات المستخدمين</h3>

        <button class="btn btn-primary" onclick="openAddPermission()">
            إضافة صلاحية
        </button>
    </div>

    <!-- جدول الصلاحيات -->
    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-bordered table-striped text-center align-middle">

                <thead class="table-dark">
                    <tr>
                        <th>الدور</th>
                        <th>إضافة</th>
                        <th>تعديل</th>
                        <th>حذف</th>
                        <th>أرشفة</th>
                        <th>استعادة</th>
                        <th>العمليات</th>
                    </tr>
                </thead>

                <tbody id="permissionsTable"></tbody>

            </table>

        </div>
    </div>

</div>

<!-- نافذة الإضافة -->
<div class="modal fade" id="addPermissionModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title fw-bold">إضافة صلاحية</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <label class="fw-bold mb-2">الدور</label>
                <input id="addRole" class="form-control mb-3">

                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="addCanAdd">
                    <label class="form-check-label">إضافة</label>
                </div>

                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="addCanEdit">
                    <label class="form-check-label">تعديل</label>
                </div>

                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="addCanDelete">
                    <label class="form-check-label">حذف</label>
                </div>

                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="addCanArchive">
                    <label class="form-check-label">أرشفة</label>
                </div>

                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="addCanRestore">
                    <label class="form-check-label">استعادة</label>
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-success w-100" onclick="addPermission()">
                    حفظ
                </button>
            </div>

        </div>
    </div>
</div>

<!-- نافذة التعديل -->
<div class="modal fade" id="editPermissionModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title fw-bold">تعديل الصلاحية</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" id="editPermissionId">

                <label class="fw-bold mb-2">الدور</label>
                <input id="editRole" class="form-control mb-3 bg-light" readonly>

                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="editCanAdd">
                    <label class="form-check-label">إضافة</label>
                </div>

                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="editCanEdit">
                    <label class="form-check-label">تعديل</label>
                </div>

                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="editCanDelete">
                    <label class="form-check-label">حذف</label>
                </div>

                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="editCanArchive">
                    <label class="form-check-label">أرشفة</label>
                </div>

                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="editCanRestore">
                    <label class="form-check-label">استعادة</label>
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-success w-100" onclick="updatePermission()">
                    حفظ التعديلات
                </button>
            </div>

        </div>
    </div>
</div>

<script src="../js/permissions.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
