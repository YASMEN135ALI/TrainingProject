<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الصلاحيات</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

    <!-- شريط علوي -->
    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand mb-0 h1">إدارة الصلاحيات</span>
        <a href="../dashboard.html" class="btn btn-secondary btn-sm">رجوع</a>
    </nav>

    <div class="container mt-4">

        <div class="d-flex justify-content-between mb-3">
            <h3 class="fw-bold">الصلاحيات</h3>
            <button class="btn btn-primary" onclick="openAddPermission()">إضافة صلاحيات لدور</button>
        </div>

        <!-- جدول الصلاحيات -->
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-striped text-center">
                    <thead>
                        <tr>
                            <th>الدور</th>
                            <th>إضافة</th>
                            <th>تعديل</th>
                            <th>حذف</th>
                            <th>أرشفة</th>
                            <th>استعادة</th>
                            <th>العمليات</th>
                        </tr>
                    </thead>
                    <tbody id="permissionsTable">
                        <!-- تعبئة من JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- نافذة إضافة صلاحيات -->
    <div class="modal fade" id="addPermissionModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">إضافة صلاحيات لدور</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <label class="fw-bold">الدور</label>
                    <select id="addRole" class="form-control">
                        <option value="employee">موظف</option>
                        <option value="manager">مسؤول قسم</option>
                        <option value="admin">مدير نظام</option>
                    </select>

                    <div class="mt-3">
                        <label><input type="checkbox" id="addCanAdd"> إضافة</label><br>
                        <label><input type="checkbox" id="addCanEdit"> تعديل</label><br>
                        <label><input type="checkbox" id="addCanDelete"> حذف</label><br>
                        <label><input type="checkbox" id="addCanArchive"> أرشفة</label><br>
                        <label><input type="checkbox" id="addCanRestore"> استعادة</label>
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" onclick="addPermission()">حفظ</button>
                </div>

            </div>
        </div>
    </div>

    <!-- نافذة تعديل صلاحيات -->
    <div class="modal fade" id="editPermissionModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">تعديل صلاحيات الدور</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="editPermissionId">

                    <label class="fw-bold">الدور</label>
                    <input id="editRole" class="form-control" disabled>

                    <div class="mt-3">
                        <label><input type="checkbox" id="editCanAdd"> إضافة</label><br>
                        <label><input type="checkbox" id="editCanEdit"> تعديل</label><br>
                        <label><input type="checkbox" id="editCanDelete"> حذف</label><br>
                        <label><input type="checkbox" id="editCanArchive"> أرشفة</label><br>
                        <label><input type="checkbox" id="editCanRestore"> استعادة</label>
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" onclick="updatePermission()">حفظ التعديلات</button>
                </div>

            </div>
        </div>
    </div>

    <script src="../js/permissions.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
